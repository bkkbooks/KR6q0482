body:
  text: 覺浪和尚語録序天下之大善知識莫若江南江南之大善知識莫若覺浪和尚年未古稀而閩楚吳越江淮以底舊京建業展坐具者閲歷五十會大道場聲名洋溢無間華夷到處雲行雨施影從響附欽為明神戀如慈父實目前所罕遘往昔所希有也良繇洞上真鋼刮人眼膜夢筆靈氣直射斗牛居恆澄徹一門該練三學遂使儒門淡泊收拾不住者茲得皈師換一頭面翻一筋斗而禪門之徒無論玄門之徒又無論矣不慧嘗讀孟子七篇至末章敘述堯文至孔子見知聞知道統皎於日星歸結然而無有乎爾則亦無有乎爾兩句著語囫圇咬嚼不破全似言語道斷見聞雙泯從此無復擔荷魯道之人金絲堂鐘鼓章䙜剎那間交付西來衣鉢之旨又嘗讀莊子內七篇外雜草六篇其中有東郭子問道惡乎在莊子疊答以在螻蟻在稊稗在瓦甓在屎溺又有與物無際不際之際等句子全似麻三斤乾屎橛前後際斷為呵佛罵祖西來大意無義話頭最先嚆矢抑何奇特吻合甚也是知孔教而孟宗老教而莊宗釋迦教而達摩宗宗中教教中宗參同妙協臭腐神奇則浪和尚之坐進此道而集三聖大成固有不可思議者在矣是以筆説舌説實説權説橫説豎説旁説曲説熾然説無間歇説語大莫載語小莫破毫末不足窮至細之倪天地不足窮至廣之域所謂萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛尺水可使興波狂瀾偏能砥柱逝者不舍晝夜資深若決江河即令四隩橫流大地陸沈畢竟大覺海中前波不動後波後浪一如前浪眼見傾湫倒峽換谷移陵總不越曹溪一滴青原半點洞山五位東苑一指呼吸飛灑中萬派朝宗處源頭活水來遇此解者可許讀浪和尚等身著述少分相應乎不慧自從白下滄桑之日麈剎相對浹歲盤桓數數然望洋向若而歎拊髀雀躍而遊比來檇李兩番卓杖諸剎翹首企足瞻禮趨迎恐後旬月之間説大戒於龍淵而真如而楞嚴而天寧幢幡爭致鼓吹同聲浩浩説法狼籍如許悉憑朱葵石郡侯矢無邊心締最上契純陀之供屢修維摩之坐常滿圓就棗梨香積終始輪藏勝因自憨山雪嶠兩大師飛錫我禾檀緣輻輳以來未有如浪和尚之擎扶象教拂拭禪門咄咄後先輝映者也神豹寸班吉光片羽禾録之視諸録特芥子之納須彌耳而明眼人見偏得全聞一知十不止作東土文字觀併不止作西來無文字觀則於標一函三之旨思過半矣欽命國子司業前戊辰二甲進士工部虞衡郎大理左寺副曹溪侍者福徵談貞默槃談謹撰
